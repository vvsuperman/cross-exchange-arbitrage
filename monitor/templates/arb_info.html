<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>套利信息监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            text-align: center;
        }
        
        .nav-links {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .nav-links a {
            color: #667eea;
            text-decoration: none;
            margin: 0 15px;
            font-size: 14px;
        }
        
        .nav-links a:hover {
            text-decoration: underline;
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
        }
        
        label {
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        select, input[type="datetime-local"], input[type="number"] {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        select:focus, input[type="datetime-local"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
            position: sticky;
            top: 0;
            white-space: nowrap;
        }
        
        tr:hover {
            background: #f5f5f5;
        }
        
        .positive {
            color: #10B981;
            font-weight: 600;
        }
        
        .negative {
            color: #EF4444;
            font-weight: 600;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 16px;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            border-left: 4px solid #c33;
        }
        
        .info {
            background: #e3f2fd;
            color: #1976d2;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            border-left: 4px solid #1976d2;
        }
        
        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f0f4f8;
            border-radius: 8px;
        }
        
        .summary-item {
            text-align: center;
        }
        
        .summary-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .summary-value {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }
        
        .direction-buy {
            color: #10B981;
        }
        
        .direction-sell {
            color: #EF4444;
        }
        
        .time-gap {
            font-family: monospace;
        }
        
        .client-order-id {
            font-family: monospace;
            font-size: 11px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 套利信息监控</h1>
        
        <div class="nav-links">
            <a href="/">← 返回价差监控</a>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <label for="symbol">选择标的：</label>
                <select id="symbol">
                    <option value="">全部</option>
                    {% for t in tickers %}
                    <option value="{{ t }}">{{ t }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="control-group">
                <label for="start_time">开始时间：</label>
                <input type="datetime-local" id="start_time" value="{{ default_start }}">
            </div>
            
            <div class="control-group">
                <label for="end_time">结束时间：</label>
                <input type="datetime-local" id="end_time" value="{{ default_end }}">
            </div>
            
            <div class="control-group">
                <label for="limit">显示数量：</label>
                <select id="limit">
                    <option value="50">50</option>
                    <option value="100" selected>100</option>
                    <option value="200">200</option>
                    <option value="500">500</option>
                </select>
            </div>
            
            <div class="control-group" style="justify-content: flex-end;">
                <button class="btn" id="loadBtn" onclick="loadData()">加载数据</button>
            </div>
        </div>
        
        <div id="loading" class="loading" style="display: none;">
            正在加载数据...
        </div>
        
        <div id="error" class="error" style="display: none;"></div>
        
        <div id="summary" class="summary" style="display: none;">
            <div class="summary-item">
                <div class="summary-label">总记录数</div>
                <div class="summary-value" id="totalCount">0</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">平均发现价差</div>
                <div class="summary-value" id="avgDiscoverySpread">-</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">平均实际价差</div>
                <div class="summary-value" id="avgActualSpread">-</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">平均Received延迟</div>
                <div class="summary-value" id="avgReceivedGap">-</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">平均EdgeX成交延迟</div>
                <div class="summary-value" id="avgEdgexGap">-</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">平均Lighter成交延迟</div>
                <div class="summary-value" id="avgLighterGap">-</div>
            </div>
        </div>
        
        <div id="table-container" class="table-container" style="display: none;">
            <table>
                <thead>
                    <tr>
                        <th>标的</th>
                        <th>发现时间</th>
                        <th>发现价差</th>
                        <th>实际价差</th>
                        <th>价差差异</th>
                        <th>Received延迟</th>
                        <th>EdgeX成交延迟</th>
                        <th>Lighter成交延迟</th>
                        <th>方向</th>
                        <th>Client Order ID</th>
                    </tr>
                </thead>
                <tbody id="data-table">
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        function formatNumber(num, decimals = 4) {
            if (num === null || num === undefined) return '-';
            return (num * 100).toFixed(decimals) + '%';
        }
        
        function formatTimeGap(seconds) {
            if (seconds === null || seconds === undefined) return '-';
            if (seconds < 1) {
                return (seconds * 1000).toFixed(0) + 'ms';
            }
            return seconds.toFixed(3) + 's';
        }
        
        function formatTime(timestamp) {
            if (!timestamp) return '-';
            const dt = new Date(timestamp);
            const month = String(dt.getMonth() + 1).padStart(2, '0');
            const day = String(dt.getDate()).padStart(2, '0');
            const hours = String(dt.getHours()).padStart(2, '0');
            const minutes = String(dt.getMinutes()).padStart(2, '0');
            const seconds = String(dt.getSeconds()).padStart(2, '0');
            return `${month}-${day} ${hours}:${minutes}:${seconds}`;
        }
        
        function getSpreadClass(value) {
            if (value === null || value === undefined) return '';
            return value >= 0 ? 'positive' : 'negative';
        }
        
        function getDirectionClass(direction) {
            if (!direction) return '';
            return direction.toLowerCase() === 'buy' ? 'direction-buy' : 'direction-sell';
        }
        
        function loadData() {
            const symbol = document.getElementById('symbol').value;
            const startTime = document.getElementById('start_time').value;
            const endTime = document.getElementById('end_time').value;
            const limit = document.getElementById('limit').value;
            
            // 显示加载状态
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';
            document.getElementById('table-container').style.display = 'none';
            document.getElementById('summary').style.display = 'none';
            document.getElementById('loadBtn').disabled = true;
            
            // 构建URL
            const params = new URLSearchParams({
                symbol: symbol,
                start_time: startTime ? new Date(startTime).toISOString() : '',
                end_time: endTime ? new Date(endTime).toISOString() : '',
                limit: limit
            });
            
            fetch(`/api/arb_info?${params}`)
                .then(response => response.json())
                .then(result => {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('loadBtn').disabled = false;
                    
                    if (!result.success) {
                        document.getElementById('error').textContent = result.message || '加载数据失败';
                        document.getElementById('error').style.display = 'block';
                        return;
                    }
                    
                    const data = result.data;
                    
                    // 计算统计信息
                    let discoverySpreadSum = 0, discoverySpreadCount = 0;
                    let actualSpreadSum = 0, actualSpreadCount = 0;
                    let receivedGapSum = 0, receivedGapCount = 0;
                    let edgexGapSum = 0, edgexGapCount = 0;
                    let lighterGapSum = 0, lighterGapCount = 0;
                    
                    data.forEach(item => {
                        if (item.discovery_spread_ratio !== null && item.discovery_spread_ratio !== undefined) {
                            discoverySpreadSum += item.discovery_spread_ratio;
                            discoverySpreadCount++;
                        }
                        if (item.actual_spread_ratio !== null && item.actual_spread_ratio !== undefined) {
                            actualSpreadSum += item.actual_spread_ratio;
                            actualSpreadCount++;
                        }
                        if (item.received_time_gap !== null && item.received_time_gap !== undefined) {
                            receivedGapSum += item.received_time_gap;
                            receivedGapCount++;
                        }
                        if (item.edgex_filled_time_gap !== null && item.edgex_filled_time_gap !== undefined) {
                            edgexGapSum += item.edgex_filled_time_gap;
                            edgexGapCount++;
                        }
                        if (item.lighter_filled_time_gap !== null && item.lighter_filled_time_gap !== undefined) {
                            lighterGapSum += item.lighter_filled_time_gap;
                            lighterGapCount++;
                        }
                    });
                    
                    // 更新统计信息
                    document.getElementById('totalCount').textContent = data.length;
                    document.getElementById('avgDiscoverySpread').textContent = discoverySpreadCount > 0 
                        ? formatNumber(discoverySpreadSum / discoverySpreadCount) : '-';
                    document.getElementById('avgActualSpread').textContent = actualSpreadCount > 0 
                        ? formatNumber(actualSpreadSum / actualSpreadCount) : '-';
                    document.getElementById('avgReceivedGap').textContent = receivedGapCount > 0 
                        ? formatTimeGap(receivedGapSum / receivedGapCount) : '-';
                    document.getElementById('avgEdgexGap').textContent = edgexGapCount > 0 
                        ? formatTimeGap(edgexGapSum / edgexGapCount) : '-';
                    document.getElementById('avgLighterGap').textContent = lighterGapCount > 0 
                        ? formatTimeGap(lighterGapSum / lighterGapCount) : '-';
                    
                    document.getElementById('summary').style.display = 'grid';
                    
                    // 生成表格
                    const tbody = document.getElementById('data-table');
                    tbody.innerHTML = '';
                    
                    data.forEach(item => {
                        const spreadDiff = (item.actual_spread_ratio !== null && item.discovery_spread_ratio !== null)
                            ? item.actual_spread_ratio - item.discovery_spread_ratio
                            : null;
                        
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td><strong>${item.symbol || '-'}</strong></td>
                            <td>${formatTime(item.discovery_time)}</td>
                            <td class="${getSpreadClass(item.discovery_spread_ratio)}">${formatNumber(item.discovery_spread_ratio)}</td>
                            <td class="${getSpreadClass(item.actual_spread_ratio)}">${formatNumber(item.actual_spread_ratio)}</td>
                            <td class="${getSpreadClass(spreadDiff)}">${formatNumber(spreadDiff)}</td>
                            <td class="time-gap">${formatTimeGap(item.received_time_gap)}</td>
                            <td class="time-gap">${formatTimeGap(item.edgex_filled_time_gap)}</td>
                            <td class="time-gap">${formatTimeGap(item.lighter_filled_time_gap)}</td>
                            <td>
                                <span class="${getDirectionClass(item.edgex_direction)}">E:${item.edgex_direction || '-'}</span> / 
                                <span class="${getDirectionClass(item.lighter_direction)}">L:${item.lighter_direction || '-'}</span>
                            </td>
                            <td class="client-order-id">${item.client_order_id || '-'}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                    
                    document.getElementById('table-container').style.display = 'block';
                })
                .catch(error => {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('loadBtn').disabled = false;
                    document.getElementById('error').textContent = '加载数据时出错: ' + error.message;
                    document.getElementById('error').style.display = 'block';
                });
        }
        
        // 页面加载时自动加载数据
        window.addEventListener('DOMContentLoaded', function() {
            loadData();
        });
    </script>
</body>
</html>
