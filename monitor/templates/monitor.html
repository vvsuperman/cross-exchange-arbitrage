<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>价差监控系统</title>
    <!-- 引入 Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            text-align: center;
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
        }
        
        label {
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        select, input[type="datetime-local"] {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        select:focus, input[type="datetime-local"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            grid-column: 1 / -1;
            max-width: 200px;
            margin: 0 auto;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .chart-container {
            margin-top: 30px;
            position: relative;
            height: 500px;
        }
        
        #spreadChart {
            max-height: 500px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .stat-card h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .stat-item:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            color: #666;
            font-size: 14px;
        }
        
        .stat-value {
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 16px;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            border-left: 4px solid #c33;
        }
        
        .info {
            background: #e3f2fd;
            color: #1976d2;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            border-left: 4px solid #1976d2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 价差监控系统</h1>
        
        <div style="text-align: center; margin-bottom: 20px;">
            <a href="/arb_info" style="color: #667eea; text-decoration: none; font-size: 14px;">查看套利信息监控 →</a>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <label for="ticker">选择标的：</label>
                <select id="ticker">
                    {% for t in tickers %}
                    <option value="{{ t }}">{{ t }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="control-group">
                <label for="exchange1">交易所1：</label>
                <select id="exchange1">
                    <option value="edgex" selected>EdgeX</option>
                    <option value="lighter">Lighter</option>
                    <option value="backpack">Backpack</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="exchange2">交易所2：</label>
                <select id="exchange2">
                    <option value="edgex">EdgeX</option>
                    <option value="lighter" selected>Lighter</option>
                    <option value="backpack">Backpack</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="start_time">开始时间：</label>
                <input type="datetime-local" id="start_time" value="{{ default_start }}">
            </div>
            
            <div class="control-group">
                <label for="end_time">结束时间：</label>
                <input type="datetime-local" id="end_time" value="{{ default_end }}">
            </div>
            
            <div class="control-group">
                <label for="window_seconds">时间窗口（秒）：</label>
                <select id="window_seconds">
                    <option value="30" selected>30秒</option>
                    <option value="60">60秒</option>
                    <option value="120">120秒</option>
                    <option value="300">300秒（5分钟）</option>
                </select>
            </div>
            
            <button class="btn" id="loadBtn" onclick="loadData()">加载数据</button>
        </div>
        
        <div id="loading" class="loading" style="display: none;">
            正在加载数据...
        </div>
        
        <div id="error" class="error" style="display: none;"></div>
        
        <div id="chart-container" class="chart-container" style="display: none;">
            <canvas id="spreadChart"></canvas>
        </div>
        
        <div id="price-charts-container" style="display: none; margin-top: 30px;">
            <div class="chart-container" style="margin-bottom: 30px;">
                <canvas id="exchange1PriceChart"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="exchange2PriceChart"></canvas>
            </div>
        </div>
        
        <div id="stats" class="stats" style="display: none;"></div>
    </div>
    
    <script>
        let chart = null; // 全局图表对象
        let exchange1PriceChart = null; // 交易所1价格图表
        let exchange2PriceChart = null; // 交易所2价格图表
        
        // 交易所显示名称映射
        const exchangeNames = {
            'edgex': 'EdgeX',
            'lighter': 'Lighter',
            'backpack': 'Backpack'
        };
        
        function formatDateTimeLocal(datetimeStr) {
            // 将ISO格式转换为datetime-local格式
            const dt = new Date(datetimeStr);
            const year = dt.getFullYear();
            const month = String(dt.getMonth() + 1).padStart(2, '0');
            const day = String(dt.getDate()).padStart(2, '0');
            const hours = String(dt.getHours()).padStart(2, '0');
            const minutes = String(dt.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day}T${hours}:${minutes}`;
        }
        
        function formatNumber(num, decimals = 4) {
            return num.toFixed(decimals);
        }
        
        function createChart(data) {
            const ctx = document.getElementById('spreadChart').getContext('2d');
            
            // 准备数据
            const timestamps = data.timestamps.map(ts => new Date(ts));
            
            const datasets = [];
            const exchange1Name = exchangeNames[data.exchange1] || data.exchange1;
            const exchange2Name = exchangeNames[data.exchange2] || data.exchange2;
            
            // 价差1数据: (exchange2_best_bid - exchange1_best_ask) / exchange2_best_bid
            if (data.spread_1 && data.spread_1.length > 0) {
                const spread1Data = data.spread_1.map((val, idx) => ({
                    x: timestamps[idx],
                    y: val !== null ? val * 100 : null
                })).filter(item => item.y !== null);
                
                datasets.push({
                    label: `(${exchange2Name}_bid - ${exchange1Name}_ask) / ${exchange1Name}_bid`,
                    data: spread1Data,
                    borderColor: '#2E86AB',
                    backgroundColor: 'rgba(46, 134, 171, 0.1)',
                    borderWidth: 1.5,
                    fill: false,
                    tension: 0.1,
                    pointRadius: 0,
                    pointHoverRadius: 4
                });
            }
            
            // 价差2数据: (exchange1_best_bid - exchange2_best_ask) / exchange1_best_bid
            if (data.spread_2 && data.spread_2.length > 0) {
                const spread2Data = data.spread_2.map((val, idx) => ({
                    x: timestamps[idx],
                    y: val !== null ? val * 100 : null
                })).filter(item => item.y !== null);
                
                datasets.push({
                    label: `(${exchange1Name}_bid - ${exchange2Name}_ask) / ${exchange2Name}_bid`,
                    data: spread2Data,
                    borderColor: '#A23B72',
                    backgroundColor: 'rgba(162, 59, 114, 0.1)',
                    borderWidth: 1.5,
                    fill: false,
                    tension: 0.1,
                    pointRadius: 0,
                    pointHoverRadius: 4
                });
            }
            
            // 价差信号锚点
            if (data.spread_signals && data.spread_signals.length > 0) {
                // 为每个信号找到最接近的时间点并计算价差值
                const signalPoints1 = []; // 用于价差1的锚点
                const signalPoints2 = []; // 用于价差2的锚点
                
                data.spread_signals.forEach(signal => {
                    const signalTime = new Date(signal.timestamp).getTime();
                    
                    // 找到最接近的时间点
                    let closestIdx = -1;
                    let minDiff = Infinity;
                    timestamps.forEach((ts, idx) => {
                        const tsTime = new Date(ts).getTime();
                        const diff = Math.abs(tsTime - signalTime);
                        if (diff < minDiff) {
                            minDiff = diff;
                            closestIdx = idx;
                        }
                    });
                    
                    // 如果找到了接近的时间点（在60秒内），则添加锚点
                    if (closestIdx >= 0 && minDiff < 60000) {
                        // 优先使用信号中的 spread_pct
                        let spreadValue = null;
                        if (signal.spread_pct !== null && signal.spread_pct !== undefined) {
                            spreadValue = signal.spread_pct * 100;
                        } else {
                            // 如果没有 spread_pct，根据信号方向选择对应的价差值
                            if (signal.direction && signal.direction.includes('spread1')) {
                                // spread1 对应价差1
                                if (data.spread_1 && data.spread_1[closestIdx] !== null && data.spread_1[closestIdx] !== undefined) {
                                    spreadValue = data.spread_1[closestIdx] * 100;
                                }
                            } else if (signal.direction && signal.direction.includes('spread2')) {
                                // spread2 对应价差2
                                if (data.spread_2 && data.spread_2[closestIdx] !== null && data.spread_2[closestIdx] !== undefined) {
                                    spreadValue = data.spread_2[closestIdx] * 100;
                                }
                            } else {
                                // 如果方向不明确，尝试两个价差
                                if (data.spread_1 && data.spread_1[closestIdx] !== null && data.spread_1[closestIdx] !== undefined) {
                                    spreadValue = data.spread_1[closestIdx] * 100;
                                } else if (data.spread_2 && data.spread_2[closestIdx] !== null && data.spread_2[closestIdx] !== undefined) {
                                    spreadValue = data.spread_2[closestIdx] * 100;
                                }
                            }
                        }
                        
                        if (spreadValue !== null) {
                            const point = {
                                x: new Date(signal.timestamp),
                                y: spreadValue
                            };
                            
                            // 根据方向决定添加到哪个数据集
                            if (signal.direction && signal.direction.includes('spread1')) {
                                signalPoints1.push(point);
                            } else if (signal.direction && signal.direction.includes('spread2')) {
                                signalPoints2.push(point);
                            } else {
                                // 如果方向不明确，添加到两个数据集
                                signalPoints1.push(point);
                                signalPoints2.push(point);
                            }
                        }
                    }
                });
                
                // 添加价差1的锚点
                if (signalPoints1.length > 0) {
                    datasets.push({
                        label: '价差信号 (Spread 1)',
                        data: signalPoints1,
                        borderColor: '#FF6B6B',
                        backgroundColor: '#FF6B6B',
                        borderWidth: 2,
                        pointRadius: 6,
                        pointHoverRadius: 8,
                        pointStyle: 'circle',
                        showLine: false,
                        type: 'scatter'
                    });
                }
                
                // 添加价差2的锚点
                if (signalPoints2.length > 0) {
                    datasets.push({
                        label: '价差信号 (Spread 2)',
                        data: signalPoints2,
                        borderColor: '#FFA500',
                        backgroundColor: '#FFA500',
                        borderWidth: 2,
                        pointRadius: 6,
                        pointHoverRadius: 8,
                        pointStyle: 'circle',
                        showLine: false,
                        type: 'scatter'
                    });
                }
            }
            
            // 销毁旧图表
            if (chart) {
                chart.destroy();
            }
            
            // 创建新图表
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    },
                    plugins: {
                        title: {
                            display: true,
                            text: `Spread Curves - ${data.ticker} (${exchange1Name} vs ${exchange2Name})`,
                            font: {
                                size: 16,
                                weight: 'bold'
                            },
                            padding: 20
                        },
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                usePointStyle: true,
                                padding: 15,
                                font: {
                                    size: 11
                                }
                            }
                        },
                        tooltip: {
                            enabled: true,
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': ' + formatNumber(context.parsed.y) + '%';
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                unit: 'minute',
                                displayFormats: {
                                    minute: 'MM-dd HH:mm',
                                    hour: 'MM-dd HH:mm'
                                }
                            },
                            title: {
                                display: true,
                                text: 'Time'
                            },
                            grid: {
                                color: 'rgba(0, 0, 0, 0.1)'
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'Spread (%)'
                            },
                            grid: {
                                color: 'rgba(0, 0, 0, 0.1)'
                            },
                            ticks: {
                                callback: function(value) {
                                    return formatNumber(value) + '%';
                                }
                            }
                        }
                    }
                }
            });
        }
        
        function createPriceChart(canvasId, data, exchangeName, exchangeBid, exchangeAsk) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            const timestamps = data.timestamps.map(ts => new Date(ts));
            
            const datasets = [];
            
            // 买价数据
            if (exchangeBid && exchangeBid.length > 0) {
                const bidData = exchangeBid.map((val, idx) => ({
                    x: timestamps[idx],
                    y: val !== null ? val : null
                })).filter(item => item.y !== null);
                
                datasets.push({
                    label: 'Best Bid',
                    data: bidData,
                    borderColor: '#10B981',
                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                    borderWidth: 1.5,
                    fill: false,
                    tension: 0.1,
                    pointRadius: 0,
                    pointHoverRadius: 4
                });
            }
            
            // 卖价数据
            if (exchangeAsk && exchangeAsk.length > 0) {
                const askData = exchangeAsk.map((val, idx) => ({
                    x: timestamps[idx],
                    y: val !== null ? val : null
                })).filter(item => item.y !== null);
                
                datasets.push({
                    label: 'Best Ask',
                    data: askData,
                    borderColor: '#EF4444',
                    backgroundColor: 'rgba(239, 68, 68, 0.1)',
                    borderWidth: 1.5,
                    fill: false,
                    tension: 0.1,
                    pointRadius: 0,
                    pointHoverRadius: 4
                });
            }
            
            // 销毁旧图表
            if (canvasId === 'exchange1PriceChart' && exchange1PriceChart) {
                exchange1PriceChart.destroy();
            } else if (canvasId === 'exchange2PriceChart' && exchange2PriceChart) {
                exchange2PriceChart.destroy();
            }
            
            // 创建新图表
            const newChart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    },
                    plugins: {
                        title: {
                            display: true,
                            text: `${exchangeName} Price - ${data.ticker}`,
                            font: {
                                size: 16,
                                weight: 'bold'
                            },
                            padding: 20
                        },
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                usePointStyle: true,
                                padding: 15,
                                font: {
                                    size: 11
                                }
                            }
                        },
                        tooltip: {
                            enabled: true,
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': ' + formatNumber(context.parsed.y, 2);
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                unit: 'minute',
                                displayFormats: {
                                    minute: 'MM-dd HH:mm',
                                    hour: 'MM-dd HH:mm'
                                }
                            },
                            title: {
                                display: true,
                                text: 'Time'
                            },
                            grid: {
                                color: 'rgba(0, 0, 0, 0.1)'
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'Price'
                            },
                            grid: {
                                color: 'rgba(0, 0, 0, 0.1)'
                            },
                            ticks: {
                                callback: function(value) {
                                    return formatNumber(value, 2);
                                }
                            }
                        }
                    }
                }
            });
            
            // 保存图表引用
            if (canvasId === 'exchange1PriceChart') {
                exchange1PriceChart = newChart;
            } else if (canvasId === 'exchange2PriceChart') {
                exchange2PriceChart = newChart;
            }
            
            return newChart;
        }
        
        function loadData() {
            const ticker = document.getElementById('ticker').value;
            const exchange1 = document.getElementById('exchange1').value;
            const exchange2 = document.getElementById('exchange2').value;
            const startTime = document.getElementById('start_time').value;
            const endTime = document.getElementById('end_time').value;
            const windowSeconds = document.getElementById('window_seconds').value;
            
            // 验证交易所选择
            if (exchange1 === exchange2) {
                document.getElementById('error').textContent = '请选择两个不同的交易所';
                document.getElementById('error').style.display = 'block';
                return;
            }
            
            // 显示加载状态
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';
            document.getElementById('chart-container').style.display = 'none';
            document.getElementById('price-charts-container').style.display = 'none';
            document.getElementById('stats').style.display = 'none';
            document.getElementById('loadBtn').disabled = true;
            
            // 构建URL
            const params = new URLSearchParams({
                ticker: ticker,
                exchange1: exchange1,
                exchange2: exchange2,
                start_time: startTime ? new Date(startTime).toISOString() : '',
                end_time: endTime ? new Date(endTime).toISOString() : '',
                window_seconds: windowSeconds
            });
            
            fetch(`/api/spread_data?${params}`)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('loadBtn').disabled = false;
                    
                    if (!data.success) {
                        document.getElementById('error').textContent = data.message || '加载数据失败';
                        document.getElementById('error').style.display = 'block';
                        return;
                    }
                    
                    // 创建价差图表
                    createChart(data);
                    document.getElementById('chart-container').style.display = 'block';
                    
                    // 创建价格图表
                    const exchange1Name = exchangeNames[data.exchange1] || data.exchange1;
                    const exchange2Name = exchangeNames[data.exchange2] || data.exchange2;
                    
                    createPriceChart('exchange1PriceChart', data, exchange1Name, data.exchange1_bid, data.exchange1_ask);
                    createPriceChart('exchange2PriceChart', data, exchange2Name, data.exchange2_bid, data.exchange2_ask);
                    document.getElementById('price-charts-container').style.display = 'block';
                    
                    // 显示统计信息
                    let statsHTML = '';
                    
                    if (data.spread_1_stats) {
                        statsHTML += `
                            <div class="stat-card">
                                <h3>价差1: (${exchange2Name}_bid - ${exchange1Name}_ask) / ${exchange2Name}_bid</h3>
                                <div class="stat-item">
                                    <span class="stat-label">平均值：</span>
                                    <span class="stat-value">${formatNumber(data.spread_1_stats.mean)}%</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-label">中位数：</span>
                                    <span class="stat-value">${formatNumber(data.spread_1_stats.median)}%</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-label">最大值：</span>
                                    <span class="stat-value">${formatNumber(data.spread_1_stats.max)}%</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-label">最小值：</span>
                                    <span class="stat-value">${formatNumber(data.spread_1_stats.min)}%</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-label">标准差：</span>
                                    <span class="stat-value">${formatNumber(data.spread_1_stats.std)}%</span>
                                </div>
                            </div>
                        `;
                    }
                    
                    if (data.spread_2_stats) {
                        statsHTML += `
                            <div class="stat-card">
                                <h3>价差2: (${exchange1Name}_bid - ${exchange2Name}_ask) / ${exchange1Name}_bid</h3>
                                <div class="stat-item">
                                    <span class="stat-label">平均值：</span>
                                    <span class="stat-value">${formatNumber(data.spread_2_stats.mean)}%</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-label">中位数：</span>
                                    <span class="stat-value">${formatNumber(data.spread_2_stats.median)}%</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-label">最大值：</span>
                                    <span class="stat-value">${formatNumber(data.spread_2_stats.max)}%</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-label">最小值：</span>
                                    <span class="stat-value">${formatNumber(data.spread_2_stats.min)}%</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-label">标准差：</span>
                                    <span class="stat-value">${formatNumber(data.spread_2_stats.std)}%</span>
                                </div>
                            </div>
                        `;
                    }
                    
                    if (statsHTML) {
                        document.getElementById('stats').innerHTML = statsHTML;
                        document.getElementById('stats').style.display = 'grid';
                    }
                })
                .catch(error => {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('loadBtn').disabled = false;
                    document.getElementById('error').textContent = '加载数据时出错: ' + error.message;
                    document.getElementById('error').style.display = 'block';
                });
        }
        
        // 监听交易所选择变化，确保两个交易所不同
        document.addEventListener('DOMContentLoaded', function() {
            const exchange1Select = document.getElementById('exchange1');
            const exchange2Select = document.getElementById('exchange2');
            
            function validateExchanges() {
                if (exchange1Select.value === exchange2Select.value) {
                    exchange2Select.style.borderColor = '#c33';
                } else {
                    exchange2Select.style.borderColor = '#e0e0e0';
                }
            }
            
            exchange1Select.addEventListener('change', validateExchanges);
            exchange2Select.addEventListener('change', validateExchanges);
        });
        
        // 页面加载时自动加载数据
        window.addEventListener('DOMContentLoaded', function() {
            loadData();
        });
    </script>
</body>
</html>
